name: ci

# Manual-only for now — this repo's main cost is the engine build, which
# already has its own manual workflow (build-engines.yml). The library CI
# (lint/typecheck/test/build) runs on demand from the Actions tab.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  typecheck-lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: prettier
        run: npm run lint

      - name: typecheck
        run: npm run typecheck

      - name: unit tests
        run: npm test

      - name: build (library only, no engine artifacts yet)
        run: npm run build
