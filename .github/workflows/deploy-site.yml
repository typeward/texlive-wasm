name: deploy-site

# Builds the showcase site (demo/) and deploys it to GitHub Pages.
#
# Engine .wasm artifacts come from the latest GitHub Release (or an explicit
# tag via the dispatch input); the TeX tree is assembled on the runner by
# scripts/fetch-tds.sh (cached) with formats rebuilt by the wasm engines
# themselves, then packed into core/texmf.tar.gz.
#
# Prerequisites: the repo is public, Pages is enabled with Source = GitHub
# Actions, and at least one v* release with engine assets exists.

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Engine release tag (default: latest release)'
        required: false
  push:
    branches: [main]
    paths:
      - 'demo/**'
      - 'src/**'
      - 'scripts/fetch-tds.sh'
      - 'scripts/pack-tds.mjs'
      - 'scripts/build-fmt.mjs'
      - 'scripts/build-xelatex-fmt.mjs'
      - 'scripts/build-lualatex-fmt.mjs'
      - '.github/workflows/deploy-site.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-site:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            demo/package-lock.json

      - name: download engine release assets
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          mkdir -p release-assets engine-artifacts
          gh release download ${RELEASE_TAG:+"$RELEASE_TAG"} \
            -p '*-emscripten.tar.gz' -p 'icudt78l.dat.gz' -D release-assets
          # Tarballs carry <engine>/emscripten/... entry paths (pack-release.mjs).
          for t in release-assets/*-emscripten.tar.gz; do
            tar -xzf "$t" -C engine-artifacts
          done
          gunzip -c release-assets/icudt78l.dat.gz > engine-artifacts/icudt78l.dat
          find engine-artifacts -maxdepth 3 | sort

      - name: cache TDS tree
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: engine-artifacts/texmf
          key: tds-${{ hashFiles('scripts/fetch-tds.sh') }}

      - name: fetch TDS (no-op on cache hit)
        run: bash scripts/fetch-tds.sh

      # biblatex validates the .bbl format version and biber validates the
      # .bcf version — a mismatched pair refuses to run (observed live:
      # biber 2.18 rejects biblatex-3.19 control files). Fail the deploy
      # rather than ship a broken pairing.
      - name: check biber/biblatex version lockstep
        run: node scripts/check-biber-lockstep.mjs

      # .fmt files are binary-coupled to the exact engine build — always
      # regenerate them with the wasm engines just downloaded (overwrites
      # whatever the cached tree holds).
      - name: rebuild formats with the wasm engines
        run: |
          node scripts/build-fmt.mjs
          node scripts/build-xelatex-fmt.mjs
          node scripts/build-lualatex-fmt.mjs

      # A format that dumps successfully can still fail to typeset (a half-loaded
      # latex.ltx, an engine/tree version skew). Compile a real document with
      # every engine against the freshly dumped formats *before* they are sealed
      # into the bundle the site serves.
      - name: compile smoke — every engine
        run: node scripts/smoke-all.mjs

      - name: pack TDS bundle
        run: node scripts/pack-tds.mjs

      - name: build library (demo consumes it via file:..)
        run: |
          npm ci
          npm run build

      - name: build showcase site
        run: |
          npm --prefix demo ci
          npm --prefix demo run build

      - name: stage runtime assets into dist/core
        run: |
          for e in pdflatex xelatex lualatex bibtexu xdvipdfmx makeindex biber; do
            mkdir -p "demo/dist/core/$e/emscripten"
            cp "engine-artifacts/$e/emscripten/$e.js" \
               "engine-artifacts/$e/emscripten/$e.wasm" \
               "demo/dist/core/$e/emscripten/"
          done
          # biber's Perl runtime VFS rides beside its wasm.
          cp engine-artifacts/biber/emscripten/biber-vfs.tar.gz demo/dist/core/biber/emscripten/
          cp engine-artifacts/texmf.tar.gz engine-artifacts/icudt78l.dat demo/dist/core/
          du -sh demo/dist demo/dist/core

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: demo/dist

  deploy:
    needs: build-site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
