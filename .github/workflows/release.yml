name: release

# Tag-driven release: builds every engine via the docker toolchain, packs
# the artifacts into per-engine tar.gz files (scripts/pack-release.mjs),
# and attaches them to the GitHub Release for the pushed tag.
#
# Trigger:
#   git tag v0.1.0 && git push --tags
# Or manually from the Actions tab; pick an existing tag.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish (e.g. v0.1.0)'
        required: true

# The tag being released: the pushed tag, or the dispatch input (on
# workflow_dispatch GITHUB_REF_NAME is the *branch*, so it must not be used
# as a fallback there). Exposed via env so run blocks never interpolate
# user input directly (script-injection hygiene).
env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        engine: [pdflatex, xelatex, lualatex, bibtexu, xdvipdfmx, makeindex, biber]
        target: [emscripten]
    steps:
      - uses: actions/checkout@v7
        with:
          # On manual dispatch, build the tag's code — not the default branch.
          ref: ${{ github.event.inputs.tag || github.ref }}
          submodules: recursive

      - uses: docker/setup-buildx-action@v4

      # Exposes ACTIONS_RUNTIME_TOKEN / ACTIONS_CACHE_URL to run steps so
      # `docker buildx --cache-from/--cache-to=type=gha` can authenticate.
      - uses: crazy-max/ghaction-github-runtime@v4

      - name: build toolchain image (cached)
        run: |
          docker buildx build \
            --cache-from=type=gha \
            --cache-to=type=gha,mode=max \
            --tag texlive-wasm-builder:ci \
            --load \
            engine/

      - name: build ${{ matrix.engine }}-${{ matrix.target }}
        # ENABLE_THREADS=0 is already the Makefile default; pin it here so a
        # future default flip can't silently ship shared-memory artifacts
        # (which won't instantiate in Android System WebView).
        run: |
          docker run --rm \
            -v "$PWD":/workspace -w /workspace/engine \
            texlive-wasm-builder:ci \
            make -j$(nproc) ENABLE_THREADS=0 ${{ matrix.engine }}-${{ matrix.target }}

      - name: stage artifact
        run: |
          mkdir -p staged
          cp "engine/build/${{ matrix.engine }}/${{ matrix.target }}/${{ matrix.engine }}.wasm" staged/
          cp "engine/build/${{ matrix.engine }}/${{ matrix.target }}/${{ matrix.engine }}.js" staged/ 2>/dev/null || true
          # Regression guard: single-threaded artifacts must not allocate
          # SharedArrayBuffer-backed memory.
          if [ -f "staged/${{ matrix.engine }}.js" ] && grep -q 'shared:true' "staged/${{ matrix.engine }}.js"; then
            echo "::error::${{ matrix.engine }}.js contains shared:true — threaded build leaked into the release"
            exit 1
          fi
          # ICU locale data rides along with the xelatex leg (bibtexu uses it too).
          if [ "${{ matrix.engine }}" = "xelatex" ]; then
            cp vendor/texlive-source/libs/icu/icu-src/source/data/in/icudt78l.dat staged/
          fi
          # biber ships its Perl runtime VFS beside the wasm.
          if [ "${{ matrix.engine }}" = "biber" ]; then
            cp "engine/build/biber/emscripten/biber-vfs.tar.gz" staged/
          fi
          ls -la staged/

      - name: upload engine artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.engine }}-${{ matrix.target }}
          path: staged/
          retention-days: 7

  pack-and-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: download all engine artifacts
        uses: actions/download-artifact@v8
        with:
          path: engine-artifacts-staging/

      - name: stage engine-artifacts/ tree
        run: |
          mkdir -p engine-artifacts
          for dir in engine-artifacts-staging/*/; do
            name=$(basename "$dir")            # e.g. pdflatex-emscripten
            engine=${name%-*}
            target=${name##*-}
            mkdir -p "engine-artifacts/$engine/$target"
            cp -r "$dir"/* "engine-artifacts/$engine/$target/"
          done
          # pack-release.mjs expects the ICU data at the tree root.
          icu=$(find engine-artifacts -name icudt78l.dat | head -1)
          if [ -n "$icu" ] && [ "$icu" != "engine-artifacts/icudt78l.dat" ]; then
            mv "$icu" engine-artifacts/icudt78l.dat
          fi
          ls -R engine-artifacts/ | head -40

      - name: pack release tarballs
        run: |
          node scripts/pack-release.mjs --version "$RELEASE_TAG"
          ls -la release/
          cat release/checksums.json

      - name: upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            release/*.tar.gz
            release/*.dat.gz
            release/checksums.json
          fail_on_unmatched_files: true
          generate_release_notes: true
