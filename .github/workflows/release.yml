name: release

# Tag-driven release: builds every engine via the docker toolchain, assembles
# the TeX tree and dumps the formats with those very engines, compiles a real
# document through every engine we advertise (scripts/smoke-all.mjs), packs the
# artifacts into per-engine tar.gz files plus the TDS bundles
# (scripts/pack-release.mjs), attaches them to the GitHub Release for the pushed
# tag, and then publishes the wrapper package to npm via trusted publishing
# (OIDC).
#
# A release carries everything a fresh consumer install needs to compile
# offline: engines (.wasm/.js), ICU data, biber's Perl runtime VFS, the TeX tree
# (texmf.tar.gz full tier + texmf-core-<engine>.tar.gz mobile tier) and, inside
# those bundles, the .fmt formats dumped by the engines being published.
#
# Trigger:
#   git tag v0.1.0 && git push --tags
# Or manually from the Actions tab; pick an existing tag.
#
# Third-party actions are pinned by commit SHA (the tag on the comment is the
# release the SHA belongs to). A tag can be re-pointed at new code; a commit
# cannot.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish (e.g. v0.1.0)'
        required: true

# The tag being released: the pushed tag, or the dispatch input (on
# workflow_dispatch GITHUB_REF_NAME is the *branch*, so it must not be used
# as a fallback there). Exposed via env so run blocks never interpolate
# user input directly (script-injection hygiene).
env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        engine: [pdflatex, xelatex, lualatex, bibtexu, xdvipdfmx, makeindex, biber]
        target: [emscripten]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # On manual dispatch, build the tag's code — not the default branch.
          ref: ${{ github.event.inputs.tag || github.ref }}
          submodules: recursive

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      # Exposes ACTIONS_RUNTIME_TOKEN / ACTIONS_CACHE_URL to run steps so
      # `docker buildx --cache-from/--cache-to=type=gha` can authenticate.
      - uses: crazy-max/ghaction-github-runtime@04d248b84655b509d8c44dc1d6f990c879747487 # v4

      - name: build toolchain image (cached)
        run: |
          docker buildx build \
            --cache-from=type=gha \
            --cache-to=type=gha,mode=max \
            --tag texlive-wasm-builder:ci \
            --load \
            engine/

      - name: build ${{ matrix.engine }}-${{ matrix.target }}
        # ENABLE_THREADS=0 is already the Makefile default; pin it here so a
        # future default flip can't silently ship shared-memory artifacts
        # (which won't instantiate in Android System WebView).
        run: |
          docker run --rm \
            -v "$PWD":/workspace -w /workspace/engine \
            texlive-wasm-builder:ci \
            make -j$(nproc) ENABLE_THREADS=0 ${{ matrix.engine }}-${{ matrix.target }}

      - name: stage artifact
        run: |
          mkdir -p staged
          cp "engine/build/${{ matrix.engine }}/${{ matrix.target }}/${{ matrix.engine }}.wasm" staged/
          cp "engine/build/${{ matrix.engine }}/${{ matrix.target }}/${{ matrix.engine }}.js" staged/ 2>/dev/null || true
          # Regression guard: single-threaded artifacts must not allocate
          # SharedArrayBuffer-backed memory.
          if [ -f "staged/${{ matrix.engine }}.js" ] && grep -q 'shared:true' "staged/${{ matrix.engine }}.js"; then
            echo "::error::${{ matrix.engine }}.js contains shared:true — threaded build leaked into the release"
            exit 1
          fi
          # ICU locale data rides along with the xelatex leg (bibtexu uses it too).
          if [ "${{ matrix.engine }}" = "xelatex" ]; then
            cp vendor/texlive-source/libs/icu/icu-src/source/data/in/icudt78l.dat staged/
          fi
          # biber ships its Perl runtime VFS beside the wasm.
          if [ "${{ matrix.engine }}" = "biber" ]; then
            cp "engine/build/biber/emscripten/biber-vfs.tar.gz" staged/
          fi
          ls -la staged/

      # Nothing leaves this job unchecked: wasm magic, section framing and a
      # non-empty export section, a size floor, gzip magic on the side-cars, and
      # the lazy-FS entry points the worker mounts /texmf-dist through. A leg
      # whose build silently produced nothing fails here instead of packing a
      # placeholder into the release.
      - name: validate ${{ matrix.engine }} artifact
        run: node scripts/validate-artifacts.mjs staged --engine ${{ matrix.engine }}

      - name: upload engine artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.engine }}-${{ matrix.target }}
          path: staged/
          retention-days: 7

  # The release gate, and the producer of the TeX tree the release ships. A real
  # \documentclass{article} document has to compile through every engine and
  # helper we advertise, using the artifacts this run just built. Grepping the
  # glue for `shared:true` (in `build`) proves the engines are single-threaded;
  # only this job proves they still typeset.
  #
  # The TDS bundles are packed here, right after the smoke that exercised them,
  # and handed to `pack-and-release` as an artifact: the tree assembly is the
  # expensive part of a release, and doing it a second time in the packing job
  # would both double it and let the release publish a tree that nothing
  # compiled against.
  smoke:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      # Node 20 (the package's floor). smoke-all.mjs skips its WASI leg below
      # Node 22 — correct here: the release ships emscripten artifacts only.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: download all engine artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          # Engine legs only — this job produces `tds-bundles` itself, and a
          # bare download would drag any other artifact into the staging tree.
          pattern: '*-emscripten'
          path: engine-artifacts-staging/

      - name: stage engine-artifacts/ tree
        run: bash .github/scripts/stage-engine-artifacts.sh

      - name: validate engine artifacts
        run: node scripts/validate-artifacts.mjs engine-artifacts

      - name: fetch TDS
        # Deliberately uncached, unlike deploy-site: fetch-tds.sh is a no-op
        # whenever engine-artifacts/texmf is non-empty, so a partially restored
        # cache would silently publish a truncated TeX tree.
        run: bash scripts/fetch-tds.sh

      # biblatex validates the .bbl format version and biber validates the .bcf
      # version — a mismatched pair refuses to run. Fail before the smoke so the
      # failure names the real cause.
      - name: check biber/biblatex version lockstep
        run: node scripts/check-biber-lockstep.mjs

      # .fmt files are binary-coupled to the exact engine build — regenerate
      # them with the engines under test, not with Ubuntu's.
      - name: rebuild formats with the wasm engines
        run: |
          node scripts/build-fmt.mjs
          node scripts/build-xelatex-fmt.mjs
          node scripts/build-lualatex-fmt.mjs

      - name: compile smoke — every engine
        run: node scripts/smoke-all.mjs

      # texmf.tar.gz is the full tier; texmf-core-<engine>.tar.gz is the subset a
      # mobile app preloads (only engines with a scripts/data/core-tier.<engine>.list
      # have one). Both names are the contract the library's bundleUrl and the
      # Tauri example's HEAD probe rely on. The formats ride inside the bundles
      # (web2c/*/*.fmt) — no separate format asset to keep in sync.
      # --no-brotli: the release publishes the gzip only (WebKit has no
      # DecompressionStream('br')), and brotli-11 on this tree costs minutes per
      # bundle — four of them here.
      - name: pack TDS bundles
        run: |
          node scripts/pack-tds.mjs --no-brotli
          for engine in pdflatex xelatex lualatex; do
            node scripts/pack-tds.mjs --tier core --engine "$engine" --no-brotli
          done
          ls -la engine-artifacts/*.tar.gz

      - name: upload TDS bundles
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: tds-bundles
          # Top-level bundles only; .tar.br is never published (WebKit has no
          # DecompressionStream('br')).
          path: engine-artifacts/*.tar.gz
          # Already gzip — re-deflating hundreds of MB buys nothing.
          compression-level: 0
          retention-days: 7

  pack-and-release:
    needs: [build, smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # The engines are derived works of TeX Live, so its license travels inside
      # every binary archive and pack-release.mjs refuses to pack without it.
      # Neither texlive-source nor the Ubuntu texlive packages fetch-tds.sh
      # unpacks carry LICENSE.TL — it lives at the root of a TeX Live
      # installation — so it has to come from the checkout. Resolved up front so
      # a missing license costs seconds, not a whole packing run.
      - name: resolve TeX Live LICENSE.TL
        run: |
          for candidate in \
            LICENSE.TL \
            vendor/texlive-source/LICENSE.TL \
            engine-artifacts/LICENSE.TL \
            engine-artifacts/texmf/LICENSE.TL; do
            if [ -s "$candidate" ]; then
              echo "LICENSE.TL: $candidate ($(wc -c < "$candidate") bytes)"
              exit 0
            fi
          done
          echo "::error::no TeX Live LICENSE.TL in the checkout — copy it from a TeX Live installation root into ./LICENSE.TL and re-tag. Engine archives are not publishable without it (--skip-license is for local packs only)."
          exit 1

      - name: download all engine artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          # Engine legs only: the TDS bundles are downloaded separately, straight
          # into engine-artifacts/ where pack-release.mjs looks for them.
          pattern: '*-emscripten'
          path: engine-artifacts-staging/

      - name: stage engine-artifacts/ tree
        run: bash .github/scripts/stage-engine-artifacts.sh

      - name: download TDS bundles
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: tds-bundles
          path: engine-artifacts/

      # Last gate before anything is published: re-runs the structural checks on
      # the assembled tree, which also catches an artifact that arrived truncated
      # and a bundle that is not a gzip stream.
      - name: validate release inputs
        run: node scripts/validate-artifacts.mjs engine-artifacts

      - name: pack release tarballs
        run: |
          node scripts/pack-release.mjs --version "$RELEASE_TAG"
          ls -la release/
          cat release/checksums.json

      - name: upload to GitHub Release
        # release/*.tar.gz covers the per-engine engine archives *and* the TDS
        # bundles pack-release copied through; checksums.json carries a size +
        # sha256 for every one of them.
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            release/*.tar.gz
            release/*.dat.gz
            release/checksums.json
          fail_on_unmatched_files: true
          generate_release_notes: true

  # npm trusted publishing (OIDC) — no NPM_TOKEN secret anywhere. One-time
  # setup on npmjs.com: trusted publisher for repo typeward/texlive-wasm,
  # workflow release.yml, with "publish only via trusted publisher" enabled.
  # Provenance attestations are generated automatically under trusted
  # publishing (requires npm CLI >= 11.5.1).
  #
  # Runs only after the engine assets are live on the GitHub Release, so a
  # freshly published wrapper can always `download-assets` its own tag.
  publish-npm:
    needs: pack-and-release
    # Forks that enable Actions would reach the OIDC exchange and fail
    # noisily; the trusted publisher is scoped to this repo only.
    if: github.repository == 'typeward/texlive-wasm'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing needs npm >= 11.5.1; node 20 bundles npm 10.x.
      - run: npm install -g 'npm@^11.5.1'

      - run: npm ci

      - run: npm run build

      - name: version guard — package.json must match the release tag
        # Version contract (release-ops plan §2): wrapper npm version ==
        # engine-assets release tag == manifest version. The CLI's
        # download-assets defaults to tag v<package.json version>, so a
        # mismatched publish would fetch assets that don't exist.
        run: |
          pkg_version=$(node -p "require('./package.json').version")
          if [ "v$pkg_version" != "$RELEASE_TAG" ]; then
            echo "::error::package.json version ($pkg_version) does not match release tag ($RELEASE_TAG) — bump package.json and re-tag"
            exit 1
          fi

      - name: publish to npm
        # Dist-tag policy: stable versions publish as `latest`; prereleases
        # (-alpha/-beta/…) publish under `next`, so `npx @typeward/texlive-wasm`
        # and a bare `npm install @typeward/texlive-wasm` never resolve a
        # prerelease by accident. npm also REFUSES to publish a prerelease
        # without an explicit --tag, so this is a hard requirement, not just
        # our policy.
        run: |
          pkg_name=$(node -p "require('./package.json').name")
          pkg_version=$(node -p "require('./package.json').version")
          case "$pkg_version" in
            *-*) dist_tag=next ;;
            *)   dist_tag=latest ;;
          esac
          echo "publishing $pkg_name@$pkg_version (dist-tag: $dist_tag)"
          npm publish --access public --tag "$dist_tag"
