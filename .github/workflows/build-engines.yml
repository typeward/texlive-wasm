name: build-engines

# Long-running engine-compilation pipeline. Triggered manually or on tags.
# Each engine × target is a separate job; on manual dispatch the `engines`
# and `targets` inputs select which matrix legs actually run.
#
# synctex is intentionally absent: it's built into each engine and the JS
# parser in src/synctex/ covers standalone parsing (see CLAUDE.md).

on:
  workflow_dispatch:
    inputs:
      engines:
        description: 'Space-separated engine list (default: all)'
        required: false
        default: 'pdflatex xelatex lualatex bibtexu xdvipdfmx makeindex'
      targets:
        description: 'Space-separated targets (default: emscripten wasi)'
        required: false
        default: 'emscripten wasi'
  push:
    tags:
      - 'engines-v*'

permissions:
  contents: read

jobs:
  # GitHub rejects the `matrix` context in job-level `if:` expressions, so
  # input-driven selection happens by generating the matrix itself.
  plan:
    runs-on: ubuntu-latest
    outputs:
      engines: ${{ steps.plan.outputs.engines }}
      targets: ${{ steps.plan.outputs.targets }}
    steps:
      - name: expand inputs into matrix JSON
        id: plan
        env:
          # On tag pushes the inputs context is empty — fall back to everything.
          ENGINES: ${{ inputs.engines || 'pdflatex xelatex lualatex bibtexu xdvipdfmx makeindex' }}
          TARGETS: ${{ inputs.targets || 'emscripten wasi' }}
        run: |
          {
            echo "engines=$(printf '%s\n' $ENGINES | jq -Rcn '[inputs]')"
            echo "targets=$(printf '%s\n' $TARGETS | jq -Rcn '[inputs]')"
          } >> "$GITHUB_OUTPUT"

  builder-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Exposes ACTIONS_RUNTIME_TOKEN / ACTIONS_CACHE_URL to run steps so
      # `docker buildx --cache-from/--cache-to=type=gha` can authenticate.
      - uses: crazy-max/ghaction-github-runtime@v3

      - name: build the toolchain image (cached)
        run: |
          docker buildx build \
            --cache-from=type=gha \
            --cache-to=type=gha,mode=max \
            --tag texlive-wasm-builder:ci \
            --load \
            engine/

  build:
    needs: [plan, builder-image]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        engine: ${{ fromJSON(needs.plan.outputs.engines) }}
        target: ${{ fromJSON(needs.plan.outputs.targets) }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/setup-buildx-action@v3

      - uses: crazy-max/ghaction-github-runtime@v3

      - name: rebuild toolchain image from cache
        run: |
          docker buildx build \
            --cache-from=type=gha \
            --tag texlive-wasm-builder:ci \
            --load \
            engine/

      - name: ${{ matrix.engine }}-${{ matrix.target }}
        run: |
          docker run --rm \
            -v "$PWD":/workspace -w /workspace/engine \
            texlive-wasm-builder:ci \
            make -j$(nproc) ${{ matrix.engine }}-${{ matrix.target }}

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.engine }}-${{ matrix.target }}
          path: |
            engine/build/${{ matrix.engine }}/${{ matrix.target }}/*.wasm
            engine/build/${{ matrix.engine }}/${{ matrix.target }}/*.js
          retention-days: 7

  manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: download engine artifacts
        uses: actions/download-artifact@v4
        with:
          path: engine-artifacts/

      - name: build manifest (placeholder — needs real TDS tree)
        run: |
          mkdir -p dist
          echo '{"schema":1,"version":"ci-stub","generatedAt":"'"$(date -Iseconds)"'","coreBundleUrl":null,"fullBundleUrl":null,"cdnBaseUrl":null,"files":{}}' \
            > dist/tex-packages.json
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: manifest
          path: dist/tex-packages.json
          retention-days: 14
