name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  typecheck-lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: prettier
        run: npm run lint

      - name: typecheck
        run: npm run typecheck

      - name: unit tests
        run: npm test

      - name: build (library only, no engine artifacts yet)
        run: npm run build
